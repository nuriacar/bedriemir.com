<table width="60%" border="2" summary="Örnek:4"
			          style="position:relative; left:25%;font-size:14px;font-family:Verdana, Arial, Helvetica, sans-serif;">
   <!--Example : 4 -->
   <caption>
   <strong>Malzeme Fiyatları</strong> <br>
   <br>
   </caption>
   <colgroup>
   <col width="20%">
   <col width="20%">
   <col width="20%">
   </colgroup>
   <thead>
      <tr>
         <th align="center">Malzeme Türü</th>
         <th align="center">Stok Nr.</th>
         <th align="center">Fiyat (YTL)</th>
      </tr>
   </thead>
   <tbody>
      <tr>
         <td align="left">Adaptör</td>
         <td align="center">312-3</td>
         <td align="right">1.00</td>
      </tr>
      <tr>
         <td colspan="2" align="left">Anahtar (Stok Dışı Ürün)</td>
         <td align="right">10.50</td>
      </tr>
      <tr>
         <td align="left">Devre Kartı</td>
         <td align="center">322-16</td>
         <td align="right">100.30</td>
      </tr>
   </tbody>
   <tfoot>
      <tr>
         <td colspan="3" align="center">(Bu fiyatlara %15 KDV eklenecektir !)</td>
      </tr>
   </tfoot>
</table>
