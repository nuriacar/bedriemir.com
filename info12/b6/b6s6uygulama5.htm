<table width="57%" border="2"  summary="Örnek:5"
style="position:relative;left:25%;font-size:14px;font-family:Verdana, Arial, Helvetica, sans-serif;">
          <!--Example : 5 -->

          <caption>
               <strong>Malzeme Fiyatları</strong><br>
               <br>
          </caption>

          <colgroup>
               <col width="20%">
               <col width="20%">
               <col width="20%">
          </colgroup>

          <thead>
               <tr>
                    <th style="text-align:center;">Malzeme Türü</th>

                    <th style="text-align:center;">Stok-Nr.</th>

                    <th style="text-align:center;">Fiyat (YTL)</th>
               </tr>
          </thead>

          <tbody>
               <tr>
                    <td style="text-align:left;">Adaptör</td>

                    <td style="text-align:center;">312-3</td>

                    <td style="text-align:right;">1.00</td>
               </tr>

               <tr>
                    <td colspan="2" style="text-align:left;">Anahtar (Stok Dışı
                    İmalat)</td>

                    <td style="text-align:right;">10.50</td>
               </tr>

               <tr>
                    <td style="text-align:left;">Devre Kartı</td>

                    <td style="text-align:center;">322-16</td>

                    <td style="text-align:right;">100.30</td>
               </tr>
          </tbody>

          <tfoot>
               <tr>
                    <td colspan="3" style="text-align:center;">(Bu fiyatlara
                    %15 KDV eklenecektir !)</td>
               </tr>
          </tfoot>
     </table>
